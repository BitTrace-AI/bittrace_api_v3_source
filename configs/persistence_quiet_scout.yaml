profile_name: persistence_quiet_scout

deployment_candidate_config: configs/canonical_deployment_candidate.yaml
source_deployment_run_root: ../runs/canonical_deployment_candidate/REPLACE_WITH_RUN_ID

window_outputs:
  artifact_name: leanlean_window_outputs_template.json
  materialized_artifact_name: leanlean_window_outputs.json
  split_scope: [train, val, test]
  fields:
    - source_record_id
    - split
    - actual_label
    - predicted_label
    - prediction_margin
    - sequence_id
    - split_sequence_id
    - recording_index
    - sequence_position
    - operating_condition
    - bearing_id
    - frontend_input_id
    - frontend_fingerprint
    - semantic_bit_length
    - packed_bit_length

fault_counter_policy:
  mode: fault_counter
  policy_id: fc_i1_d1_y6_r12_nolatch
  increment_on_unhealthy: 1
  decrement_on_healthy: 1
  yellow_threshold: 6
  red_threshold: 12
  optional_latch: false

selection_policy:
  minimum_unhealthy_detection_rate: 0.28
  ranking_mode: quiet_scout
  require_positive_unhealthy_detection: true

policy_candidates:
  - policy_id: fc_i1_d1_y6_r12_nolatch
    increment_on_unhealthy: 1
    decrement_on_healthy: 1
    yellow_threshold: 6
    red_threshold: 12
    optional_latch: false

planned_outputs:
  tuning_dirname: persistence_tuning
  summary_json_name: persistence_quiet_scout_summary.json
  scaffold_json_name: leanlean_persistence_tuning_prep.json
  summary_csv_name: persistence_quiet_scout_summary.csv
  summary_md_name: persistence_quiet_scout_summary.md
  selected_policy_json_name: persistence_quiet_scout_profile.json
  example_traces_json_name: persistence_quiet_scout_examples.json
  per_policy_dirname: per_policy

notes:
  - "This file freezes the default quiet-scout persistence profile for the supported lane."
  - "Materialize real per-record Lean-Lean outputs under the deployment-candidate run before replaying the profile."
  - "Treat each split-local condition+bearing recording stream as an ordered sequence for replay."
  - "The runtime logic remains a simple non-latching fault counter: i1 / d1 / y6 / r12."
