profile_name: leandeep_max_search

source_profile: ../canonical_source_profile.yaml

deployment_candidate_summary_path: ../../runs/canonical_deployment_candidate/REPLACE_WITH_RUN_ID/leanlean_deployment_candidate_summary.json
current_max_search_summary_path: ../../runs/leanlean_max_search/REPLACE_WITH_RUN_ID/leanlean_max_search_summary.json
deep_layer_max_search_summary_path: ../../runs/leanlean_max_search_deep/REPLACE_WITH_RUN_ID/leanlean_max_search_deep_summary.json

leandeep_max_search:
  report_title: Lean-Deep Max Search
  notes:
    - "Separate research-only rule-out track; this does not replace the Lean-Lean deployment-candidate workflow."
    - "Frontend semantics remain fixed to the validation-winning temporal_threshold_36 regime."
    - "Backend architecture remains Lean-Deep only; no ensembles, multiclass, or persistence runtime are added."
    - "Train drives search/materialization, val selects the winner, and test remains final reporting only."
    - "This track materially increases search breadth/depth to test whether Lean-Deep can beat Lean-Lean on the conservative operating point rather than merely buying recall with noisier alerts."
    - "Deploy-relevant k limits remain unchanged through the shared source profile and deep backend request."

  evaluation:
    summary_metric_split: test
    separability_split: train
    latency_split: test
    latency_warmup_passes: 2
    latency_timed_passes: 10

  search:
    trials_per_candidate: 5
    search_branches: 20
    bounded_random_fraction: 0.40
    winner_replay_branches: 4
    winner_mutation_branches: 4
    seed_stride: 101

    selection_spec:
      primary_metric: fitness
      tiebreak_metrics: [accuracy, mean_margin]

    evolution:
      seed: 52000
      generations: 42
      population_size: 40
      mu: 20
      lam: 20
      elite_count: 5
      min_layers: 1
      max_layers: 8
      mutation_rate: 0.40
      mutation_rate_schedule: constant
      selection_mode: tournament
      tournament_k: 5
      early_stopping_patience: 10
      checkpoint: {}

    bounded_random_evolution:
      seed: 62000
      generations: 48
      population_size: 48
      mu: 24
      lam: 24
      elite_count: 6
      min_layers: 1
      max_layers: 8
      mutation_rate: 0.54
      mutation_rate_schedule: constant
      selection_mode: tournament
      tournament_k: 5
      early_stopping_patience: 12
      checkpoint: {}

    winner_replay_evolution:
      seed: 72000
      generations: 44
      population_size: 40
      mu: 20
      lam: 20
      elite_count: 5
      min_layers: 1
      max_layers: 8
      mutation_rate: 0.40
      mutation_rate_schedule: constant
      selection_mode: tournament
      tournament_k: 5
      early_stopping_patience: 11
      checkpoint: {}

    winner_mutation_evolution:
